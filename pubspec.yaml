name: kigali_city_services
description: Kigali City Services App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase with compatible web versions
  firebase_core: ^3.15.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.2
  firebase_messaging: ^15.0.2
  
  # State Management
  provider: ^6.1.1
  
  # UI Utilities
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  
  # Image
  image_picker: ^1.0.5
  
  # Location & Maps (OpenStreetMap)
  geolocator: ^10.1.0
  flutter_map: ^8.0.0
  latlong2: ^0.9.1
  
  # Utilities
  intl: ^0.18.1
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.2
  cached_network_image: ^3.3.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  # Commenting out local assets - using google_fonts instead
  # assets:
  #   - assets/images/
  #   - assets/icons/
  # 
  # fonts:
  #   - family: ProductSans
  #     fonts:
  #       - asset: assets/fonts/ProductSans-Regular.ttf
